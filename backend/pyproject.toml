[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
]
ignore = [
    "S101",  # assert in tests is fine
    "S105",  # hardcoded password detection (false positives in test fixtures)
    "S106",
    "N999",  # module name (migrations use revision IDs)
    "B008",  # FastAPI Depends() in function defaults is the standard pattern
    "S603",  # subprocess without shell=True (quality_check.py intentional)
    "S602",  # subprocess shell=True in quality_check.py is controlled input
    "E402",  # module level import not at top (test files import inside functions)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "N"]            # relax security/naming rules in tests
"migrations/**/*.py" = ["E", "N"]       # alembic autogenerated files
"scripts/**/*.py" = ["S112", "N806", "E501"]  # internal scripts: silent continue + UPPER_CASE + long demo URLs OK
# logistics 對接 ECpay：
# - N806：欄位名照 vendor doc 大寫（MerchantID / CheckMacValue 等）
# - S324：CheckMacValue 用 md5（vendor 規格、非 security purpose）
# - E501：vendor URL / signature 字串很長，硬切會降可讀性
# - F841：debug 用變數（解 ECpay payload 時保留）
"logistics/**/*.py" = ["N806", "S324", "E501", "F841"]

[tool.bandit]
exclude_dirs = ["tests", "venv", "migrations", "scripts"]
skips = [
    "B101",  # assert
    "B104",  # hardcoded 0.0.0.0 (dev server)
    "B311",  # random (we use secrets module, not random)
]
severity = "medium"  # only flag medium+ severity issues
