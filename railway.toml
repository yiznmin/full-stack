# Railway 部署配置 — yiimui 專案
#
# 兩個 service 共用同一個 Docker image（backend/Dockerfile）：
#   - backend-web: FastAPI + alembic migrate
#   - backend-worker: Celery worker（含 SAM 推論）
#
# Plugin（在 Railway dashboard 加）：
#   - PostgreSQL（自動注入 DATABASE_URL）
#   - Redis（自動注入 REDIS_URL）

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"

# 根目錄要包含 backend/ + paint-by-number/src/（Dockerfile COPY 兩個都要）
rootDirectory = "."

[deploy]
# 預設 startCommand（適用 backend-web）
# backend-worker service 內 override 為 "bash scripts/start_worker.sh"
startCommand = "bash scripts/start_web.sh"

# Railway 健康檢查：backend main.py 有 GET /health endpoint
healthcheckPath = "/health"
# alembic upgrade 在 start_web.sh 內跑，首次部署或大 migration 可能拖較久；
# timeout 拉長至 300s（5 分鐘）給足 migration + uvicorn 啟動時間
healthcheckTimeout = 300

# 部署失敗時的重啟策略
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
